<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLDRify</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>TLDRify</h1>
        <h3>Text Summarizer using Hugging Face Transformer T5-small</h3>
        <p>Write or Paste your dialogue/content for quick summarization:</p>
        
        <form id="summarization-form">
            <textarea id="dialogue-input" placeholder="Enter your text content here..." required></textarea>
            <button type="submit">Summarize</button>
        </form>
        <br>
        <div id="summary-output">
            <h3 id="summary-head">Content Summary :</h3>
            <p id="summary-text"></p>
        </div>
    </div>

    <script>
        document.getElementById("summarization-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            

        // get references to elements
            const dialogueInput = document.getElementById("dialogue-input");
            const summaryText = document.getElementById("summary-text");
            const submitButton = e.target.querySelector("button");
        
            const dialogue = dialogueInput.value.trim();
            if (!dialogue) return;
        
            // show processing message and disable button
            summaryText.innerText = "Processing...";
            submitButton.disabled = true;
        
            try{
                // send Dialogue (post req) to backend
                const response = await fetch("/summarize/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ dialogue }),
                });
        
                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }
        
                const data = await response.json();
                summaryText.innerText = data.summary || "No summary returned.";
            } 
            catch (err) {
                summaryText.innerText = `Error: ${err.message}`;
            } 
            finally {
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
