<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Text Summarizer App</h1>
        <h3>Using Hugging Face Transformer T5-small</h3>
        <p>Write or Paste your dialogue/content for quick summarization:</p>
        
        <form id="summarization-form">
            <textarea id="dialogue-input" placeholder="Enter your text content here..." required></textarea>
            <button type="submit">Summarize</button>
        </form>
        <br>
        <div id="summary-output">
            <h3 id="summary-head">Content Summary :</h3>
            <p id="summary-text"></p>
        </div>
    </div>
</body>
</html>
